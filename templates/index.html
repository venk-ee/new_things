<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Voice Bot Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root{
            --bg: #0f1221;
            --panel: #151936;
            --panel-2: #10142c;
            --text: #e8eafd;
            --muted: #afb4d4;
            --primary: #7c5cff;
            --primary-2: #4fa3ff;
            --success: #38d39f;
            --danger: #ff6b6b;
            --ring: #93c5fd55;
        }
        @media (prefers-color-scheme: light){
            :root{
                --bg:#f6f7fb; --panel:#ffffff; --panel-2:#f0f2f8;
                --text:#1a1b2e; --muted:#545b75; --primary:#5b45ff; --primary-2:#0ea5e9;
                --ring:#3b82f633
            }
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
            color:var(--text);
            background:
                radial-gradient(1200px 600px at 10% -10%, #5b45ff22, transparent 60%),
                radial-gradient(800px 500px at 110% 10%, #0ea5e922, transparent 60%),
                linear-gradient(180deg, var(--bg), var(--bg));
            min-height:100vh;
            display:flex; align-items:center; justify-content:center; padding:32px;
        }
        .app{
            width:100%; max-width:900px;
            background:linear-gradient(180deg, var(--panel), var(--panel-2));
            border:1px solid #ffffff0d;
            border-radius:16px;
            box-shadow: 0 10px 30px #00000040, inset 0 1px 0 #ffffff0c;
            overflow:hidden;
        }
        header{
            padding:18px 22px; border-bottom:1px solid #ffffff14;
            display:flex; align-items:center; justify-content:space-between; gap:12px;
            background:linear-gradient(180deg, #ffffff08, #00000000);
        }
        .brand{
            display:flex; align-items:center; gap:12px;
        }
        .logo{
            width:40px; height:40px; border-radius:10px;
            background:
                radial-gradient(80% 80% at 30% 30%, #ffffff55, transparent 60%),
                linear-gradient(135deg, var(--primary), var(--primary-2));
            display:grid; place-items:center;
            color:white; font-size:22px; box-shadow: 0 6px 16px #00000044;
        }
        .title{ font-weight:700; letter-spacing:.2px }
        .subtitle{ color:var(--muted); font-size:.92em }

        .content{ padding:20px; display:grid; gap:18px }
        .grid{
            display:grid;
            grid-template-columns: 1.1fr .9fr;
            gap:18px;
        }
        @media (max-width: 880px){ .grid{ grid-template-columns:1fr } }

        .card{
            background: #00000013;
            border:1px solid #ffffff12;
            border-radius:14px;
            padding:16px;
        }
        .card h3{ margin:0 0 10px 0; font-size:1.05rem }

        .field{ display:grid; gap:8px }
        .label-row{
            display:flex; align-items:center; justify-content:space-between; gap:8px;
        }
        .hint{ color:var(--muted); font-size:.88em }

        .input-wrap{
            position:relative; border-radius:12px; overflow:hidden;
            border:1px solid #ffffff1a; background: #0b0f22cc;
        }
        textarea#question{
            width:100%; min-height:92px; max-height:260px; resize:vertical;
            background:transparent; color:var(--text);
            border:none; outline:none; padding:14px 54px 14px 14px; line-height:1.4;
        }
        .suffix{
            position:absolute; right:8px; top:8px; display:flex; gap:8px;
        }

        .btn{
            appearance:none; border:1px solid #ffffff1c; background:#121736;
            color:var(--text); padding:10px 14px; border-radius:10px;
            cursor:pointer; font-weight:600; letter-spacing:.2px;
            display:inline-flex; align-items:center; gap:8px;
            transition: transform .05s ease, background .2s ease, border-color .2s ease, opacity .2s ease;
        }
        .btn:hover{ background:#18204a; border-color:#ffffff28 }
        .btn:active{ transform:translateY(1px) }
        .btn:disabled{ opacity:.6; cursor:not-allowed }

        .btn.primary{
            border-color: transparent;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            box-shadow: 0 6px 18px #00000055, inset 0 0 0 1px #ffffff22;
        }
        .btn.primary:hover{ filter: brightness(1.05) }

        .toolbar{ display:flex; flex-wrap:wrap; gap:10px }
        .grow{ flex:1 }

        .answer-wrap{
            position:relative; border-radius:12px; overflow:hidden;
            border:1px solid #ffffff1a; background:#070b1fcc;
        }
        textarea#answer{
            width:100%; min-height:180px; background:transparent; color:var(--text);
            border:none; outline:none; padding:14px 14px; line-height:1.5; resize:vertical;
        }
        /* Header row for the answer card */
        .card-header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin:0 0 10px 0 }
        .answer-actions{ display:flex; gap:8px; flex-wrap:wrap }

        .status{
            display:flex; align-items:center; justify-content:space-between; gap:10px;
            padding:10px 14px; border-top:1px dashed #ffffff1a; color:var(--muted);
            font-size:.9em;
        }
        .status [role=status]{ color:var(--muted) }

        .counter{ color:var(--muted); font-size:.85em }

        .spinner, .spinner:before, .spinner:after{
            border-radius:50%;
            width: 6px; height: 6px; display:inline-block; background: currentColor;
            animation: bounce 1.2s infinite ease-in-out both;
        }
        .spinner{ position:relative; color:white; opacity:.9 }
        .spinner:before, .spinner:after { content:""; position:absolute; top:0 }
        .spinner:before{ left:-8px; animation-delay: -0.24s }
        .spinner{ left:0; animation-delay: -0.12s }
        .spinner:after{ left:8px }
        @keyframes bounce{ 0%,80%,100%{ transform: scale(0) } 40%{ transform: scale(1) } }

        .mic-badge{
            display:inline-flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px;
            border:1px solid #ffffff1a; background:#0b0f22aa; color:var(--muted); font-size:.9em;
        }
        .dot{
            width:10px; height:10px; border-radius:50%;
            background: var(--muted);
        }
        .dot.pulse{
            background: #ff4d8d;
            box-shadow: 0 0 0 0 #ff4d8d88;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse{
            0%{ box-shadow: 0 0 0 0 #ff4d8d88 }
            70%{ box-shadow: 0 0 0 10px #ff4d8d00 }
            100%{ box-shadow: 0 0 0 0 #ff4d8d00 }
        }

        .toast{
            position:fixed; bottom:20px; left:50%; transform: translateX(-50%);
            background:#11152d; border:1px solid #ffffff1a; color:var(--text);
            padding:10px 14px; border-radius:10px; box-shadow:0 10px 30px #00000066;
            opacity:0; pointer-events:none; transition: opacity .2s, transform .2s;
        }
        .toast.show{ opacity:1; transform: translateX(-50%) translateY(-4px) }

        .kbd{
            font: 600 .85em ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            padding:2px 6px; border-radius:6px; border:1px solid #ffffff26; background:#0b0f22;
            color:var(--muted);
        }
        .help{ color:var(--muted); font-size:.9em }
        .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }
        .sep{ opacity:.4 }
    </style>
</head>
<body>
    <div class="app" role="application">
        <header>
            <div class="brand">
                <div class="logo" aria-hidden="true">🤖</div>
                <div>
                    <div class="title">Voice Bot</div>
                    <div class="subtitle">Speak or type. Get instant answers.</div>
                </div>
            </div>
            <div class="help">
                Tips: Press <span class="kbd">Enter</span> to ask, <span class="kbd">Shift+Enter</span> new line
                <span class="sep">·</span>
                <button id="openExternalBtn" class="btn" style="padding:6px 10px; font-size:.9em;">Open in browser</button>
            </div>
        </header>

        <div class="content">
            <div class="grid">
                <section class="card">
                    <h3>Ask your question</h3>
                    <div class="field">
                        <div class="label-row">
                            <label for="question">Your question</label>
                            <div class="counter"><span id="questionCount">0</span> / 500</div>
                        </div>
                        <div class="input-wrap">
                            <textarea id="question" maxlength="500" placeholder="Ask anything…"></textarea>
                            <div class="suffix">
                                <button id="voiceBtn" class="btn" aria-label="Speak your question" title="Speak">
                                    <span>🎤</span><span class="sr-only">Speak</span>
                                </button>
                                <button id="clearQBtn" class="btn" aria-label="Clear question" title="Clear">
                                    🧹
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="toolbar" style="margin-top:12px;">
                        <button id="askBtn" class="btn primary">
                            <span class="ask-label">Ask Bot</span>
                            <span class="ask-loading" style="display:none;"><span class="spinner"></span> Thinking…</span>
                        </button>
                        <div class="grow"></div>
                        <div class="mic-badge">
                            <span class="dot" id="micDot"></span>
                            <span id="micText">Voice ready</span>
                        </div>
                    </div>
                    <div class="status" style="margin-top:12px;">
                        <div class="hint">Use <span class="kbd">Alt</span> + <span class="kbd">M</span> to toggle mic, <span class="kbd">Alt</span> + <span class="kbd">S</span> to speak/stop answer</div>
                        <div role="status" aria-live="polite" id="statusText">Ready</div>
                    </div>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h3>Bot's answer</h3>
                        <div class="answer-actions">
                            <button id="copyAnswerBtn" class="btn" aria-label="Copy answer" title="Copy answer">📋</button>
                            <button id="clearAnswerBtn" class="btn" aria-label="Clear answer" title="Clear answer">🧼</button>
                            <button id="speakAnswerBtn" class="btn" aria-label="Speak answer" title="Speak answer">🔊 Speak</button>
                        </div>
                    </div>
                    <div class="answer-wrap">
                        <textarea id="answer" readonly placeholder="The answer will appear here…"></textarea>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="toast" class="toast" role="alert" aria-live="assertive"></div>

    <script>
    // Elements
    const askBtn = document.getElementById('askBtn');
    const askLabel = askBtn.querySelector('.ask-label');
    const askLoading = askBtn.querySelector('.ask-loading');

    const questionInput = document.getElementById('question');
    const questionCount = document.getElementById('questionCount');
    const answerBox = document.getElementById('answer');

    const speakAnswerBtn = document.getElementById('speakAnswerBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const clearQBtn = document.getElementById('clearQBtn');
    const copyAnswerBtn = document.getElementById('copyAnswerBtn');
    const clearAnswerBtn = document.getElementById('clearAnswerBtn');

    const micDot = document.getElementById('micDot');
    const micText = document.getElementById('micText');
    const statusText = document.getElementById('statusText');
    const toast = document.getElementById('toast');
    const openExternalBtn = document.getElementById('openExternalBtn');

    // Utilities
    const setStatus = (msg) => { statusText.textContent = msg; };
    let toastTimer;
    const showToast = (msg, timeout=2200) => {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), timeout);
    };

    // Character counter + button state
    const updateCountAndState = () => {
        questionCount.textContent = questionInput.value.length;
        askBtn.disabled = questionInput.value.trim().length === 0;
    };
    questionInput.addEventListener('input', updateCountAndState);
    updateCountAndState();

    // Keyboard shortcuts
    questionInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            askBtn.click();
        }
    });
    window.addEventListener('keydown', (e) => {
        if (e.altKey && (e.key === 'm' || e.key === 'M')) voiceBtn.click();
        if (e.altKey && (e.key === 's' || e.key === 'S')) speakAnswerBtn.click();
    });

    // Voice input using browser SpeechRecognition
    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
    } else if ('SpeechRecognition' in window) {
        recognition = new SpeechRecognition();
    }

    const isSecure = window.isSecureContext;
    const hasMedia = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

    const setMicReady = (ready) => {
        if (ready){
            micDot.classList.remove('pulse'); micDot.style.background = 'var(--success)';
            micText.textContent = 'Voice ready';
        } else {
            micDot.classList.remove('pulse'); micDot.style.background = 'var(--muted)';
            micText.textContent = 'Voice not available';
        }
    };
    const setMicListening = (listening) => {
        if (listening){
            micDot.classList.add('pulse');
            micText.textContent = 'Listening…';
            voiceBtn.setAttribute('aria-pressed', 'true');
        } else {
            micDot.classList.remove('pulse');
            micText.textContent = recognition ? 'Voice ready' : 'Voice not available';
            voiceBtn.removeAttribute('aria-pressed');
        }
    };

    // Try to open in external system browser (helps with VS Code preview limitations)
    openExternalBtn?.addEventListener('click', () => {
        try { window.open(window.location.href, '_blank', 'noopener,noreferrer'); } catch {}
        showToast('Opened in a new tab. Grant mic permission there.');
    });

    // Helper: ask for mic permission just-in-time and immediately stop the stream
    async function ensureMicPermission() {
        if (!isSecure) {
            throw new Error('insecure-context');
        }
        if (!hasMedia) {
            throw new Error('no-media');
        }
        let stream;
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            // Immediately stop to avoid keeping mic open
            stream.getTracks().forEach(t => t.stop());
            return true;
        } catch (err) {
            // Forward exact name if possible
            if (err && err.name) throw err; else throw new Error('mic-failed');
        }
    }

    if (recognition) {
        recognition.lang = 'en-US';
        recognition.continuous = false;
        recognition.interimResults = false;

        voiceBtn.onclick = () => {
            // Request mic access before starting recognition (better errors and permissions prompt)
            setStatus('Preparing microphone…');
            setMicListening(true);
            ensureMicPermission()
                .then(() => {
                    setStatus('Listening…');
                    try { recognition.start(); } catch (e) {
                        setMicListening(false);
                        showToast('Could not start recognition. Try again.');
                        setStatus('Voice error');
                    }
                })
                .catch((err) => {
                    setMicListening(false);
                    let msg = 'Voice input error.';
                    if (err.name === 'NotAllowedError') {
                        msg = 'Microphone blocked. Click the lock icon in the address bar to allow mic.';
                    } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                        msg = 'No microphone found. Connect a mic and try again.';
                    } else if (err.message === 'insecure-context') {
                        msg = 'Mic requires HTTPS or localhost. Open in your browser and use a secure origin.';
                    } else if (err.message === 'no-media') {
                        msg = 'This browser does not support microphone access.';
                    }
                    showToast(msg);
                    setStatus('Voice unavailable');
                });
        };
        recognition.onstart = () => {
            setMicListening(true);
        };
        recognition.onend = () => {
            setMicListening(false);
            setStatus('Ready');
        };
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            questionInput.value = transcript;
            updateCountAndState();
            setStatus('Transcribed speech');
        };
        let netRetry = 0;
        recognition.onerror = (event) => {
            setMicListening(false);
            let msg = 'Voice input error.';
            if (event.error === 'not-allowed') {
                msg = 'Microphone access denied. Please allow microphone permissions.';
            } else if (event.error === 'no-speech') {
                msg = 'No speech detected. Please try again.';
            } else if (event.error === 'audio-capture') {
                msg = 'No microphone available. Check your device settings.';
            } else if (event.error === 'service-not-allowed') {
                msg = 'Speech service not allowed. Try Chrome (not Incognito) with mic permission.';
            } else if (event.error === 'network') {
                if (netRetry < 2) {
                    netRetry++;
                    showToast('Speech service network error. Retrying… ('+netRetry+'/2)');
                    setStatus('Retrying speech service…');
                    setTimeout(() => {
                        try { recognition.start(); } catch {}
                    }, 800);
                    return; // defer generic toast below
                }
                msg = 'Speech service network error. Try: reload, disable VPN/ad-block, use Chrome (non‑Incognito), or different network.';
            }
            showToast(msg);
            setStatus('Voice error');
        };
        // Initial mic readiness indicator
        if (!isSecure) {
            setMicReady(false);
            setStatus('Mic requires HTTPS or localhost. Use “Open in browser”.');
        } else if (!hasMedia) {
            setMicReady(false);
            setStatus('Microphone API not available in this browser.');
        } else {
            setMicReady(true);
        }
    } else {
        voiceBtn.disabled = true;
        setMicReady(false);
        const why = !isSecure ? ' (and site is not on a secure origin)' : '';
        setStatus('Speech recognition is not supported in your browser' + why + '.');
    }

    // Ask Bot flow
    const setLoading = (isLoading) => {
        if (isLoading){
            askLabel.style.display = 'none';
            askLoading.style.display = 'inline-flex';
            askBtn.disabled = true;
            voiceBtn.disabled = true;
        } else {
            askLabel.style.display = '';
            askLoading.style.display = 'none';
            askBtn.disabled = questionInput.value.trim().length === 0;
            voiceBtn.disabled = !recognition;
        }
    };

    askBtn.onclick = () => {
        const question = questionInput.value.trim();
        if (!question) return;
        answerBox.value = '';
        setLoading(true);
        setStatus('Sending question…');

        fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question })
        })
        .then(async (res) => {
            if (!res.ok) throw new Error('Network error');
            return res.json();
        })
        .then(data => {
            const text = data && data.answer ? data.answer : 'Sorry, I could not get a response.';
            answerBox.value = text;
            setStatus('Answer received');
        })
        .catch((err) => {
            answerBox.value = 'Sorry, I could not get a response.';
            showToast('Request failed. Please try again.');
            setStatus('Error getting answer');
        })
        .finally(() => setLoading(false));
    };

    // Clear / Copy
    clearQBtn.onclick = () => {
        questionInput.value = '';
        updateCountAndState();
        setStatus('Cleared question');
        questionInput.focus();
    };
    copyAnswerBtn.onclick = async () => {
        const text = answerBox.value.trim();
        if (!text) return;
        try {
            await navigator.clipboard.writeText(text);
            showToast('Answer copied to clipboard');
        } catch {
            showToast('Copy failed');
        }
    };
    clearAnswerBtn.onclick = () => {
        answerBox.value = '';
        setStatus('Cleared answer');
    };

    // Speak Answer (toggle)
    const updateSpeakBtn = () => {
        if (!('speechSynthesis' in window)) return;
        if (window.speechSynthesis.speaking) {
            speakAnswerBtn.textContent = '⏹ Stop';
            speakAnswerBtn.title = 'Stop speaking';
        } else {
            speakAnswerBtn.textContent = '🔊 Speak';
            speakAnswerBtn.title = 'Speak answer';
        }
    };
    updateSpeakBtn();

    speakAnswerBtn.onclick = () => {
        if (!('speechSynthesis' in window)) {
            showToast('Speech synthesis is not supported in your browser.');
            return;
        }
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
            setStatus('Stopped speaking');
            updateSpeakBtn();
            return;
        }
        const answer = answerBox.value.trim();
        if (!answer) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(answer);
        utter.lang = 'en-US';
        utter.onstart = () => { setStatus('Speaking answer…'); updateSpeakBtn(); };
        utter.onend = () => { setStatus('Ready'); updateSpeakBtn(); };
        utter.onerror = () => { showToast('Speech error'); setStatus('Speech error'); updateSpeakBtn(); };
        window.speechSynthesis.speak(utter);
        updateSpeakBtn();
    };
    </script>
</body>
</html>
