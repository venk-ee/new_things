<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Bot - Test UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bot-bubble: #f1f5f9;
            --user-bubble: #2563eb;
            --user-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 1.5rem;
            background: var(--card-bg);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .status {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
        }

        #chat-container {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.9375rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            color: var(--text-main);
            border-bottom-left-radius: 2px;
        }

        .user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 2px;
        }

        footer {
            padding: 1.5rem;
            background: var(--card-bg);
            border-top: 1px solid #e2e8f0;
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
            max-width: 800px;
            margin: 0 auto;
        }

        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9375rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        /* Markdown-ish formatting for bot replies */
        .bot p { margin-bottom: 0.5rem; }
        .bot ul { margin-left: 1.2rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <header>
        <h1>Fashion Assistant</h1>
        <div class="status">
            <span class="status-dot"></span>
            Online
        </div>
    </header>

    <div id="chat-container">
        <div class="message bot">
            Hello! I'm your fashion assistant. How can I help you today?
        </div>
    </div>

    <footer>
        <form id="chat-form" class="input-group">
            <input type="text" id="user-input" placeholder="Ask about fashion, orders, or just say hi..." autocomplete="off">
            <button type="submit" id="send-btn">Send</button>
        </form>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Simple session ID generator
        const sessionId = Math.random().toString(36).substring(2, 15);

        function addMessage(text, isUser, intent = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            // Basic formatting for bot (newlines to paragraphs)
            if (!isUser) {
                const paragraphs = text.split('\n').filter(p => p.trim() !== '');
                paragraphs.forEach(p => {
                    const pEl = document.createElement('p');
                    pEl.textContent = p;
                    msgDiv.appendChild(pEl);
                });
            } else {
                msgDiv.textContent = text;
            }

            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            userInput.value = '';
            
            // Loading state
            sendBtn.disabled = true;
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message bot';
            loadingMsg.textContent = '...';
            chatContainer.appendChild(loadingMsg);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, message: message })
                });

                const data = await response.json();
                chatContainer.removeChild(loadingMsg);
                
                if (data.reply) {
                    addMessage(data.reply, false, data.intent);
                } else {
                    addMessage("Sorry, I encountered an error. Please try again.", false);
                }
            } catch (error) {
                console.error(error);
                chatContainer.removeChild(loadingMsg);
                addMessage("Failed to connect to the server.", false);
            } finally {
                sendBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
